[stock]
# 是否允许用公司名/别名查股票 / Allow company-name or alias lookup
enable_name_lookup = true
# 名称写错时是否启用 LLM 纠错兜底 / Use LLM fallback for typo correction
enable_llm_name_correction = true
# 名称纠错默认使用哪个 LLM vendor；为空时回退到 [llm].selected_vendor
llm_vendor = "qwen"
# 可选：覆盖名称纠错模型；为空时使用该 vendor 的默认模型
llm_model = ""
# 名称纠错超时（秒）
llm_timeout_seconds = 15
# 送给 LLM 的候选名称数；越大越稳，越慢
max_llm_candidates = 8

# 可维护的股票名称 / 别名 -> A 股代码映射（含沪深300成分股及常用别名）
# key 支持公司名、简称、常用别名；value 为 6 位 A 股代码
