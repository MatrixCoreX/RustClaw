[command_intent]
default_locale = "zh-CN"
llm_fallback_enabled = true
rules_dir = "configs/command_intent"

[database]
busy_timeout_ms = 2000
sqlite_path = "data/rustclaw.db"

[file_generation]
default_output_dir = "document"

[limits]
global_rpm = 60
user_rpm = 20

[llm]
selected_model = "gpt-4o-mini"
selected_vendor = "openai"

[llm.anthropic]
api_key = "REPLACE_ME_ANTHROPIC_API_KEY"
base_url = "https://api.anthropic.com/v1"
max_concurrency = 1
model = "claude-sonnet-4-6"
models = [
    "claude-opus-4-6",
    "claude-sonnet-4-6",
    "claude-haiku-4-5-20251001",
    "claude-3-7-sonnet-latest",
    "claude-3-5-haiku-latest",
]
timeout_seconds = 60

[llm.google]
api_key = "REPLACE_ME_GOOGLE_API_KEY"
base_url = "https://generativelanguage.googleapis.com/v1beta"
max_concurrency = 1
model = "gemini-2.5-pro"
models = [
    "gemini-3.1-pro-preview",
    "gemini-3-flash-preview",
    "gemini-2.5-pro",
    "gemini-2.5-flash",
    "gemini-2.5-flash-lite",
]
timeout_seconds = 90

[llm.grok]
api_key = "REPLACE_ME_GROK_API_KEY"
base_url = "https://api.x.ai/v1"
max_concurrency = 1
model = "grok-3"
models = [
    "grok-4-0709",
    "grok-4-1-fast-reasoning",
    "grok-4-1-fast-non-reasoning",
    "grok-3",
    "grok-3-mini",
    "grok-code-fast-1",
    "grok-2-vision-1212",
]
timeout_seconds = 60

[llm.qwen]
api_key = "REPLACE_ME_QWEN_API_KEY"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
max_concurrency = 1
model = "qwen-plus-latest"
models = [
    "qwen-max-latest",
    "qwen-plus-latest",
    "qwen-turbo-latest",
]
timeout_seconds = 60

[llm.custom]
api_key = "REPLACE_ME_CUSTOM_API_KEY"
base_url = "https://api.example.com/v1"
max_concurrency = 1
model = "custom-model"
models = ["custom-model"]
timeout_seconds = 60

[image_generation]
default_vendor = "qwen"
default_model = "wanx2.1-t2i-turbo"
qwen_models = ["wanx2.1-t2i-turbo"]
models = ["wanx2.1-t2i-turbo"]
allow_compat_adapters = true
timeout_seconds = 120
max_concurrency = 1
max_images = 4
max_input_bytes = 10485760
default_output_dir = "image/download"

[llm.openai]
api_key = "REPLACE_ME_OPENAI_API_KEY"
base_url = "https://api.openai.com/v1"
max_concurrency = 1
model = "gpt-4o-mini"
models = [
    "gpt-5.2",
    "gpt-5.2-chat-latest",
    "gpt-5.1-chat-latest",
    "gpt-5.1",
    "gpt-5-chat-latest",
    "gpt-5",
    "gpt-4.1",
    "gpt-4.1-mini",
    "gpt-4o",
    "gpt-4o-mini",
]
timeout_seconds = 60

[maintenance]
audit_max_rows = 10000
audit_retention_days = 14
cleanup_interval_seconds = 300
tasks_max_rows = 2000
tasks_retention_days = 7

[memory]
config_path = "configs/memory.toml"

[persona]
dir = "prompts/personas"
profile = "executor"

[routing]
debug_log_prompt = false

[schedule]
i18n_dir = "configs/i18n"
intent_prompt_path = "prompts/schedule_intent_prompt.md"
intent_rules_path = "prompts/schedule_intent_rules.md"
locale = "zh-CN"
timezone = "Asia/Shanghai"

[server]
listen = "127.0.0.1:8787"
request_timeout_seconds = 30

[skills]
skill_max_concurrency = 1
skill_timeout_seconds = 30
# 可选开关覆盖（优先级高于 skills_list）:
# - 设为 false: 强制关闭该技能（不会进入二层路由提示词，也不可执行）
# - 设为 true : 强制开启该技能（会进入二层路由提示词，且可执行）
# 建议用 skill_switches 控制开关，尽量不要直接改 skills_list，避免启用基线被误改。
# Recommended: use skill_switches to toggle skills, and avoid editing skills_list directly to prevent accidental baseline changes.
# 例子 / Example:
# skill_switches = { image_generate = false, rss_fetch = true }
skill_switches = {}
skills_list = [
    "x",
    "system_basic",
    "http_basic",
    "git_basic",
    "install_module",
    "process_basic",
    "package_manager",
    "archive_basic",
    "db_basic",
    "docker_basic",
    "fs_search",
    "rss_fetch",
    "image_vision",
    "image_generate",
    "image_edit",
    "audio_transcribe",
    "audio_synthesize",
    "health_check",
    "log_analyze",
    "service_control",
    "config_guard",
    "crypto",
]

[adapters.slack]
enabled = false
endpoint = ""
note = "placeholder"

[adapters.discord]
enabled = false
endpoint = ""
note = "placeholder"

[tools]
allow = ["*"]
allow_path_outside_workspace = true
allow_sudo = true
cmd_timeout_seconds = 60
deny = []
max_cmd_length = 2400
profile = "full"

[tools.by_provider.anthropic]
allow = []
deny = []

[tools.by_provider.google]
allow = []
deny = []

[tools.by_provider.grok]
allow = []
deny = []

[tools.by_provider.openai]
allow = []
deny = []

[worker]
concurrency = 3
poll_interval_ms = 500
queue_limit = 128
task_timeout_seconds = 600
