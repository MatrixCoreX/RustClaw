# Qwen copy profile for audio skills / 语音技能 Qwen 备份配置

[audio_synthesize]
default_vendor = "qwen"
adapter_mode = "auto"
allow_compat_adapters = true
qwen_native_base_url = "https://dashscope.aliyuncs.com/api/v1"
default_model = "qwen3-tts-flash"
default_voice = "nova"
default_format = "opus"
default_output_dir = "audio/download"
openai_models = ["gpt-4o-mini-tts", "gpt-4o-realtime-preview"]
google_models = ["gemini-2.5-flash-preview-tts"]
anthropic_models = []
grok_models = []
qwen_models = ["qwen3-tts-flash", "qwen3-tts-instruct-flash"]
custom_models = []
models = ["qwen3-tts-flash", "qwen3-tts-instruct-flash"]
max_concurrency = 1
max_input_chars = 4000
timeout_seconds = 60

[audio_transcribe]
default_vendor = "qwen"
adapter_mode = "auto"
allow_compat_adapters = true
qwen_native_base_url = "https://dashscope.aliyuncs.com/api/v1"
default_model = "fun-asr"
openai_models = ["whisper-1", "gpt-4o-mini-transcribe"]
google_models = ["gemini-2.5-flash"]
anthropic_models = []
grok_models = []
qwen_models = ["fun-asr", "fun-asr-mtl"]
custom_models = []
models = ["fun-asr", "fun-asr-mtl"]
max_concurrency = 1
max_input_bytes = 26214400
timeout_seconds = 90
local_auto_upload_enabled = true
oss_access_key_id = "REPLACE_ME_OSS_ACCESS_KEY_ID"
oss_access_key_secret = "REPLACE_ME_OSS_ACCESS_KEY_SECRET"
oss_bucket = "REPLACE_ME_OSS_BUCKET"
oss_endpoint = "oss-cn-beijing.aliyuncs.com"
oss_object_prefix = "rustclaw/audio"
oss_url_ttl_seconds = 3600
