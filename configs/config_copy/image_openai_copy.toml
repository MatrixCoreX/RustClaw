# OpenAI copy profile for image skills / 图片技能 OpenAI 备份配置

[image_edit]
default_vendor = "openai"
adapter_mode = "auto"
allow_compat_adapters = true
default_model = "gpt-image-1"
openai_models = ["gpt-image-1"]
google_models = ["gemini-2.5-flash-image-preview"]
anthropic_models = []
grok_models = []
qwen_models = []
models = ["gpt-image-1"]
default_output_dir = "image/download"
max_concurrency = 1
max_images = 4
max_input_bytes = 10485760
timeout_seconds = 120

[image_generation]
default_vendor = "openai"
adapter_mode = "auto"
allow_compat_adapters = true
default_model = "gpt-image-1"
openai_models = ["gpt-image-1"]
google_models = ["gemini-2.5-flash-image-preview"]
anthropic_models = []
grok_models = []
qwen_models = []
models = ["gpt-image-1"]
default_output_dir = "image/download"
max_concurrency = 1
max_images = 4
max_input_bytes = 10485760
timeout_seconds = 120

[image_vision]
default_vendor = "openai"
adapter_mode = "compat"
default_model = "gpt-4o-mini"
openai_models = ["gpt-4o-mini", "gpt-4o"]
google_models = ["gemini-2.5-flash", "gemini-2.5-pro"]
anthropic_models = ["claude-sonnet-4-6"]
qwen_models = []
models = ["gpt-4o-mini", "gpt-4o"]
default_output_dir = "image/upload"
max_concurrency = 1
max_images = 6
max_input_bytes = 10485760
timeout_seconds = 90
