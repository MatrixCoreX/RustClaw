# Feishu (Lark) 应用机器人通道配置 - Phase 1 最小可用（事件回调 / 长连接 + 文本消息）
# 使用方式（二选一）：
#   - webhook：应用机器人 → 事件订阅 → 请求地址配置为本服务 callback URL（需公网可达）
#   - long_connection：应用机器人 → 事件订阅 → 使用长连接接收事件（无需公网，内网优先）
# 不做：群机器人 webhook 模式、自定义机器人

[feishu]
# 是否启用
enabled = true
# 入站模式：webhook | long_connection
#   webhook：有公网回调地址时使用；飞书将事件 POST 到本服务，需配置 listen 并保证请求地址可达
#   long_connection：无公网时使用；本服务主动连飞书收事件，仅需出口能访问公网
mode = "long_connection"
# 本服务监听地址（webhook 模式时用于接收回调；long_connection 模式可选用于健康检查等）
listen = "0.0.0.0:8789"
# clawd 基地址，用于提交任务与轮询结果
clawd_base_url = "http://127.0.0.1:8787"
# 飞书应用 App ID
app_id = "cli_a939d198c8ba1cc8"
# 飞书应用 App Secret（日志不打印）
app_secret = "__RC_SECRET_0001__"
# 事件订阅 Verification Token（webhook 时校验请求来自飞书）
# webhook 模式下 verification_token 与 encrypt_key 至少配置一个，否则启动失败；生产环境建议两者都配置
verification_token = "__RC_SECRET_0002__"
# 事件加密密钥（webhook 时用于签名校验；Phase 1 不解密请求体）
# webhook 模式下与 verification_token 至少配置一个；生产环境建议两者都配置
encrypt_key = ""
# 单次 HTTP 请求超时秒数（submit / poll / 发消息等单次请求）
request_timeout_seconds = 30
# 整条任务轮询最长等待时间（秒）。与 request_timeout_seconds 分离：单次 poll 可能很快，但任务本身（长 chat、多步 act、生图等）可能较久，应给足时间
task_delivery_timeout_seconds = 180
# 长文本分段发送时每段最大字符数（按 UTF-8 安全截断）
text_chunk_chars = 4000
