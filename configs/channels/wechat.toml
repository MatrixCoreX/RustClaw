# WeChat channel daemon config - MVP text channel
# Typical Docker flow:
# 1. set enabled=true
# 2. keep api_base_url as the official default unless your backend is different
# 3. start wechatd from the UI service panel
# 4. open the WeChat login panel in UI and scan the QR code
# bot_token can stay empty before first QR login; session.json will be created after login.

[wechat]
enabled = true
listen = "0.0.0.0:8792"
clawd_base_url = "http://127.0.0.1:8787"
api_base_url = "https://ilinkai.weixin.qq.com"
# 图片 CDN 根地址（与 OpenClaw 插件 CDN_BASE_URL 一致）；收图解密与发图上传均依赖此域。
cdn_base_url = "https://novac2c.cdn.weixin.qq.com/c2c"
# 收到图片后的落盘根目录
image_inbox_dir = "data/wechatd/image"
# 收到视频后的落盘根目录
video_inbox_dir = "data/wechatd/video"
# 收到语音后的落盘根目录
audio_inbox_dir = "data/wechatd/audio"
# 收到文件后的落盘根目录
file_inbox_dir = "data/wechatd/file"
bot_token = ""
# Random uint32 encoded as base64 when required by upstream protocol.
wechat_uin_base64 = ""
request_timeout_seconds = 30
longpoll_timeout_ms = 35000
text_chunk_chars = 1200
# 与 OpenClaw 微信插件一致：部分部署需在请求头携带 SKRouteTag（留空则不发）。
sk_route_tag = ""
# wechatd 轮询 clawd 任务期间刷新「正在输入」的间隔（秒）。
typing_refresh_interval_secs = 5
