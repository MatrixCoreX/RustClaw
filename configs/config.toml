    "x",
    "system_basic",
    "http_basic",
    "git_basic",
    "install_module",
    "process_basic",
    "package_manager",
    "archive_basic",
    "db_basic",
    "docker_basic",
    "fs_search",
    "rss_fetch",

    "image_vision",
    "image_generate",
    "image_edit",
    "audio_transcribe",
    "audio_synthesize",
    "health_check",
    "log_analyze",
    "service_control",
    "task_control",
    "config_guard",
