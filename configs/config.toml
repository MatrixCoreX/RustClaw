# 用途/Purpose: 当现有技能不能覆盖需求时，是否允许走受控自扩展链（临时脚本/语言级依赖）.
# 建议修改/Recommended change: 默认关闭；仅在开发/受控环境开启.
# 风险/Risk: 开启后会允许内部调用 extension_manager 生成临时方案，若 allow_execute=true 还会执行临时脚本.
#
# [Phase 0.1 默认安全配置收敛 - 2026-04-17]
# 已收敛：本节六项全部 true → false，与代码里 `SelfExtensionConfig::default()` 对齐。
# 这意味着 agent 不能临时生成/安装/执行脚本（除非显式重开）。
# 生产环境强烈建议**把本 section 整节删掉**，依赖代码默认值（全 false）即可。
# 仅在受控开发环境若需要恢复自扩展能力，把对应字段单独改回 true。
[self_extension]
enabled = false
auto_on_capability_gap = false
allow_execute = false
allow_package_install = false
allow_permanent_extension = false
allow_runtime_enable = false

# Phase 7 §3.5d: prompts 热替换。
# - reload_on_sighup: 收到 SIGHUP 时把 persona / schedule.intent_prompt /
#   schedule.intent_rules 三个"启动期快照"字段与磁盘对齐，并复跑核心 prompt 校验。
#   绝大多数 prompts 已经每次 LLM 调用时从磁盘读，所以编辑 prompts/layers/**/*.md
#   下次调用就生效，无须 SIGHUP；本开关只针对上述快照字段。
# - strict_validation_at_startup: 启动时若核心 prompt 缺失、只能退回 embedded
#   include_str! 常量，则直接拒绝启动。建议生产开启，避免部署漏带 prompts/ 树。
# - config_path: reload 时重读的 config 文件路径；默认与启动一致。
# 操作示例: kill -HUP $(pgrep -x clawd)
[prompts]
reload_on_sighup = true
strict_validation_at_startup = true
config_path = "configs/config.toml"

# 渠道配置已拆分到以下文件 / Channel configs are split into:
# - configs/channels/telegram.toml（Telegram）/ Telegram channel settings
# - configs/channels/whatsapp-cloud.toml（WhatsApp Cloud / webhook）/ WhatsApp Cloud settings
# - configs/channels/whatsapp-web.toml（WhatsApp Web / QR login）/ WhatsApp Web settings
# - configs/channels/whatsapp.toml 仅作为旧混合配置兼容入口，建议不要再写实际配置

# 用途/Purpose: 预留 Slack 适配器配置（当前占位）.
# 建议修改/Recommended change: 未接入前可保持默认.
# 风险/Risk: 提前启用但 endpoint 无效会导致投递失败.
[adapters.slack]
enabled = false
endpoint = ""
note = "placeholder"

# 用途/Purpose: 预留 Discord 适配器配置（当前占位）.
