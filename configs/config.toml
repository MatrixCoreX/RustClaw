    "qwen-max-latest",
    "qwen-plus-latest",
    "qwen-turbo-latest",
]
timeout_seconds = 60
# Phase 2.5: per-vendor 默认参数（可选）。不写就沿用 vendor 默认；写了会
# 在 chat 调用没显式传 hints 时生效。例：
# [llm.qwen.params]
# default_temperature = 0.4
# default_max_tokens  = 2048
# top_p               = 0.9

# 用途/Purpose: MiniMax 提供商连接与模型池（OpenAI-compatible）.
# 建议修改/Recommended change: 可改，建议按官方最新兼容模型名维护.
# api_format：省略或空则默认 openai_compat（/chat/completions + Bearer）；设为 anthropic_claude 则 /messages + x-api-key（clawd 合成 vendor-minimax）.
# 风险/Risk: 音频/图片相关能力与 OpenAI 兼容接口的覆盖范围可能有限，必要时需补原生适配.
[llm.minimax]
api_key = ""
base_url = "https://api.minimaxi.com/v1"
max_concurrency = 2
model = "MiniMax-M3"
# Optional prompt-budget capacity override for compatible providers whose
# public model name does not expose a reliable context window. MiniMax official
# docs list MiniMax-M3 with a 1,000,000-token context window; keep this aligned
# with the active text model so routing prompts can use the larger window.
context_window_tokens = 1000000
models = [
    "MiniMax-M3",
    "MiniMax-M2.7",
    "MiniMax-M2.5",
    "MiniMax-M2.5-thinking",
    "MiniMax-M2.5-coder",
]
# MiniMax text routing/model calls can be slow under load; keep the per-request
# window aligned with worker.llm_total_timeout_seconds instead of cutting off
# normal responses at 60s.
timeout_seconds = 180

# 用途/Purpose: Xiaomi MiMo 提供商连接与模型池（OpenAI-compatible，兼容 Anthropic 协议）.
# 建议修改/Recommended change: 默认为 OpenAI-compatible；如切换 Anthropic-compatible，
