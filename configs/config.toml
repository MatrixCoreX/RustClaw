# 用途/Purpose: 工具执行白名单/黑名单与权限配置.
# 建议修改/Recommended change: 生产环境建议收紧 allow/deny 与 sudo.
# 风险/Risk: 当前 `allow=*` + `allow_sudo=true` 权限非常高，误调用风险显著.
#
# [Phase 0.1 默认安全配置收敛 - 2026-04-17]
# 已收敛项：
# - `allow_sudo`               true → false  （需要 sudo 的场景请按渠道/任务显式打开）
# - `allow_path_outside_workspace` true → false  （只读写当前 workspace 内路径）
# - `cmd_timeout_seconds`      30 → 60        （单次 shell 命令墙钟上限）
# - `cmd_idle_timeout_seconds` 新增 60        （stdout/stderr 无输出卡住上限）
# - `cmd_max_output_bytes`     新增 8000      （持续输出截断上限）
# 暂未收敛：
# - `allow = ["*"]`：保持全开。改成白名单需要枚举所有 skills_list 中的工具
#   名（约 38 项），并与 NL 回归套对齐验证；该工作单独排期。
# 生产环境请把 `allow` 改为显式小集合，例如：
#   `["run_cmd", "read_file", "write_file", "list_dir", "fs_search",
#     "service_control", "health_check", "log_analyze"]`
[tools]
allow = ["*"]
# Global baseline switch. Runtime only honors this for admin-authenticated tasks;
# ordinary users are always treated as false even when this is true.
allow_path_outside_workspace = true
# Global baseline switch. Runtime only honors this for admin-authenticated tasks;
# ordinary users are always treated as false even when this is true.
allow_sudo = true
cmd_timeout_seconds = 60
cmd_idle_timeout_seconds = 60
cmd_max_output_bytes = 8000
deny = []
max_cmd_length = 2400
profile = "full"

# 用途/Purpose: 按模型提供商细化工具 allow/deny 覆盖.
# 建议修改/Recommended change: 可改，建议用于高风险提供商最小权限化.
# 风险/Risk: 配置冲突会导致行为与预期不一致（被拒/过放开）.
[tools.by_provider.anthropic]
allow = []
deny = []

[tools.by_provider.google]
allow = []
deny = []

[tools.by_provider.grok]
allow = []
deny = []

[tools.by_provider.openai]
allow = []
deny = []

# 用途/Purpose: worker 拉取队列并发与超时.
# 建议修改/Recommended change: 可改，需结合机器资源与任务负载.
# 风险/Risk: 并发太高会争用 CPU/IO；队列太小会丢积压能力.
[worker]
# worker 并发数 / Number of concurrent workers.
concurrency = 3
# 轮询间隔（毫秒） / Queue polling interval in milliseconds.
poll_interval_ms = 500
# 队列上限 / Max queued tasks in memory.
queue_limit = 128
# 运行中心跳间隔（秒）：执行长任务时周期刷新 updated_at，避免误判“卡死”。
task_heartbeat_seconds = 30
# 运行中“无进展”超时（秒）：status=running 且 updated_at 长时间不变会自动收尾为 failed。
running_no_progress_timeout_seconds = 1200
# 无进展清理检查间隔（秒）。
running_recovery_check_interval_seconds = 60
# 单任务硬超时（秒） / Hard timeout per task in seconds.
# 注意：这是 clawd 后台任务生命周期上限，不作为 Telegram/WhatsApp 的用户侧投递等待时长。
# Phase 0.1 收敛：86400 (24h, demo 演示值) → 3600 (1h)。
# 多轮 agent 任务一般 5–15 min；超过 1h 通常是循环卡死，应当被 hard timeout 切断。
# 真有"长跑批处理"需求请按 task 级别在创建时单独提 timeout，不要把全局调回大值。
task_timeout_seconds = 3600
# 单任务 LLM 逻辑调用次数预算 / Per-task logical LLM call budget.
# 用来阻断异常循环，不限制单个 provider 内部重试次数。
llm_max_calls_per_task = 40
# 单任务 LLM 累计耗时预算（秒）/ Per-task cumulative LLM wall-clock budget in seconds.
# Mimo 等慢模型 normalizer + planner + synthesis + verifier 可能接近 8-10 分钟，默认给 15 分钟。
llm_total_timeout_seconds = 900
