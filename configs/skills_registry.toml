enabled = true
kind = "builtin"
planner_kind = "tool"
group = "filesystem"
primary_fallback_role = "fallback"
aliases = ["filesystem_basic", "file_basic"]
timeout_seconds = 45
prompt_file = "prompts/skills/fs_basic.md"
output_kind = "text"
description = "Planner-facing filesystem tool contract. Runtime dispatch maps structured actions to stable backing tools such as system_basic, fs_search, and file builtins."
semantic_tags = ["path_facts", "directory_inventory", "bounded_file_read", "file_search", "content_search", "path_compare", "file_write", "file_names", "directory_names", "file_paths", "hidden_entries_check", "scalar_count", "quantity_comparison", "existence_with_path"]
