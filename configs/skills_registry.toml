# 技能注册表 Phase 1：发现 / 启用 / 别名 / 超时 由此驱动。
# 未配置 registry_path 时 clawd 仍使用 config.toml [skills].skills_list + skill_switches。
# 配置 [skills].registry_path = "configs/skills_registry.toml" 后启用本表。

[[skills]]
name = "run_cmd"
enabled = true
kind = "builtin"
planner_kind = "tool"
group = "system"
primary_fallback_role = "fallback"
aliases = ["shell", "exec"]
timeout_seconds = 60
prompt_file = "prompts/skills/run_cmd.md"
output_kind = "text"
risk_level = "high"
auto_invocable = false
requires_confirmation = true
side_effect = true
retryable = true
supported_os = ["linux", "macos"]
required_bins = ["bash"]
optional_bins = ["sudo"]
platform_notes = ["Executes through bash on Linux/macOS; sudo use is gated by task policy."]
planner_capabilities = [
  { name = "system.run_command", effect = "external", required = ["command"], optional = ["cwd", "timeout_seconds", "idle_timeout_seconds", "max_output_bytes"], risk_level = "high", preferred = true },
]
input_schema = { type = "object", required = ["command"], properties = { command = { type = "string" }, cwd = { type = "string" }, timeout_seconds = { type = "integer" }, idle_timeout_seconds = { type = "integer" }, max_output_bytes = { type = "integer" } } }
output_schema = { type = "object", required = ["text"], properties = { text = { type = "string" } } }

