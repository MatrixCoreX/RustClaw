output_kind = "image"
# §P4.1 / §P4.4 E1.d：image_vision 调远端多模态 vendor 读图返回描述，
# 不写盘 → 只声明 llm + net + secrets。命名遵守 <用途>_<vendor>_api_key
# 规范，保持与 image_edit / image_generation / chat 四套 LLM 配置完全独立。
# 当前默认 default_vendor=mimo（见 configs/image.toml [image_vision]），默认复用
# 主 LLM provider 注入的 OPENAI_* / MIMO_API_KEY；启用独立 vendor 段时再同步追加
# secrets.image_vision_<vendor>_api_key。
capabilities = [
    "llm",
    "net",
]

[[skills]]
name = "image_generate"
enabled = true
kind = "runner"
planner_kind = "skill"
group = "image"
aliases = ["image_generation", "generate_image", "draw_image", "text_to_image"]
timeout_seconds = 180
prompt_file = "prompts/skills/image_generate.md"
output_kind = "image"
# §P4.1 主体首批示例：image_generate 走外部 LLM provider 生成图，
# 落盘到 workspace 的输出目录，因此声明 llm + net + fs.write。
# 注意：image_generation / image_edit / image_vision / [llm]（chat&规划）
# 是四套互相独立的 provider 配置（见 configs/image.toml + configs/config.toml）。
# §P4.4 / §E1.c：声明所需 secrets。命名遵守 <用途>_<vendor>_api_key
# 规范（不能用 secrets.openai_api_key 这种跨用途命名，否则会把 image
# 的 key 注入到 chat 链路）。
#
# 当前只声明 minimax —— configs/image.toml 默认 default_vendor="minimax"
# 且只启用 [image_generation.providers.minimax]。新启用别的 vendor 段
# （openai/google/qwen/...）时，必须在这里同步加 secrets.image_generation_<vendor>_api_key，
# 否则 spawn path 会按 manifest 拒绝注入对应凭证（fail-loud）。
capabilities = [
    "llm",
    "net",
    "fs.write",
    "secrets.image_generation_minimax_api_key",
]
# §P4.2 shape 一致性：fs.write 隐含写盘副作用，显式标 side_effect=true
# 让 risk 路由 / finalize 决策都能拿到正确信号。
side_effect = true

[[skills]]
name = "image_edit"
enabled = true
kind = "runner"
planner_kind = "skill"
group = "image"
aliases = ["image_modify", "image_editor", "edit_image", "image_outpaint"]
timeout_seconds = 180
prompt_file = "prompts/skills/image_edit.md"
output_kind = "image"
# §P4.1 / §P4.4 E1.d：image_edit 调远端 vendor 编辑图，落盘到 workspace。
# 默认 default_vendor=minimax（见 configs/image.toml [image_edit]）。运行时优先使用
# IMAGE_EDIT_<VENDOR>_API_KEY；未配置专用 key 时，技能可复用同厂商全局 key
# （如 MINIMAX_API_KEY），避免默认能力被空专用 secret 门禁挡住。
capabilities = [
    "llm",
    "net",
    "fs.write",
]
# §P4.2 shape consistency R3：fs.write 隐含写盘副作用 → 必须 side_effect=true。
side_effect = true

