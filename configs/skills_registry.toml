enabled = true
kind = "runner"
planner_kind = "skill"
group = "image"
aliases = ["photo_sort", "photo_classifier", "image_organize"]
timeout_seconds = 180
prompt_file = "prompts/skills/photo_organize.md"
output_kind = "text"
description = "Front-door routing contract: photo organization without source_dir is executable, not a clarification. Call photo_organize with action=organize and mode=plan so the skill can discover external drive / USB candidates and preview a unique candidate or return observed candidates."
semantic_tags = ["photo_organization", "exif_classification", "external_drive_discovery", "source_dir_optional_discovery"]
memory_policy = { profile = "skill_scoped", include = ["preferences", "relevant_facts", "knowledge_docs"], exclude = ["long_term_summary", "recent_related_events", "assistant_results", "similar_triggers", "unfinished_goals", "recent_snippets"], max_chars = 900, reason = "photo_organize_structured_args_stable_memory_only" }
risk_level = "high"
auto_invocable = false
requires_confirmation = true
side_effect = true
retryable = false
confirmation_exempt_when = [
  { action = "prepare" },
  { action = "preview" },
  { action = "plan" },
  { action = "dry_run" },
  { action = "organize", mode = "plan" },
  { action = "organize", organize_mode = "plan" },
]
planner_capabilities = [
  { name = "photo.preview_organization", action = "preview", effect = "observe", optional = ["source_dir", "mode", "organize_mode", "group_by", "capture_year", "capture_month", "capture_date", "selected_brands", "selected_models", "selected_lenses", "include_subdirs", "preview_limit"], risk_level = "low", preferred = true },
  { name = "photo.prepare_source_candidates", action = "prepare", effect = "observe", risk_level = "low", preferred = true },
  { name = "photo.apply_organization", action = "organize", effect = "mutate", required = ["source_dir"], optional = ["mode", "organize_mode", "group_by", "capture_year", "capture_month", "capture_date", "selected_brands", "selected_models", "selected_lenses", "include_subdirs", "preview_limit"], risk_level = "high" },
]

