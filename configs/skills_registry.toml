  { name = "filesystem.list_entries", action = "list_dir", effect = "observe", required = ["path"], optional = ["names_only", "max_entries", "include_hidden", "files_only", "dirs_only", "sort_by"], risk_level = "low", preferred = true },
  { name = "filesystem.count_entries", action = "count_entries", effect = "observe", required = ["path"], optional = ["include_hidden", "files_only", "dirs_only"], risk_level = "low", preferred = true },
  { name = "filesystem.read_text_range", action = "read_text_range", effect = "observe", required = ["path"], optional = ["start_line", "end_line", "max_bytes"], risk_level = "low", preferred = true },
  { name = "filesystem.find_entries", action = "find_entries", effect = "observe", optional = ["root", "pattern", "ext", "target_kind", "max_results"], risk_level = "low", preferred = true },
  { name = "filesystem.grep_text", action = "grep_text", effect = "observe", required = ["query"], optional = ["root", "max_results"], risk_level = "low", preferred = true },
  { name = "filesystem.compare_paths", action = "compare_paths", effect = "observe", required = ["left_path|paths", "right_path|paths"], risk_level = "low", preferred = true },
  { name = "filesystem.write_file", action = "write_text", effect = "mutate", required = ["path", "content"], risk_level = "high", preferred = true },
  { name = "filesystem.append_text", action = "append_text", effect = "mutate", required = ["path", "content"], risk_level = "high", preferred = true },
  { name = "filesystem.make_dir", action = "make_dir", effect = "mutate", required = ["path"], risk_level = "high", preferred = true },
  { name = "filesystem.remove_path", action = "remove_path", effect = "mutate", required = ["path"], risk_level = "high", preferred = true },
]
input_schema = { type = "object", required = ["action"], properties = { action = { type = "string", enum = ["stat_paths", "list_dir", "count_entries", "read_text_range", "find_entries", "grep_text", "compare_paths", "write_text", "append_text", "make_dir", "remove_path"] }, path = { type = "string" }, paths = { anyOf = [ { type = "string" }, { type = "array", items = { type = "string" } } ] }, root = { type = "string" }, pattern = { anyOf = [ { type = "string" }, { type = "array", items = { type = "string" } } ] }, ext = { anyOf = [ { type = "string" }, { type = "array", items = { type = "string" } } ] }, query = { type = "string" }, content = { type = "string" }, target_kind = { type = "string" }, include_hidden = { type = "boolean" }, files_only = { type = "boolean" }, dirs_only = { type = "boolean" }, names_only = { type = "boolean" }, sort_by = { type = "string" }, max_entries = { type = "integer" }, max_results = { type = "integer" }, mode = { type = "string" }, n = { type = "integer" }, start_line = { type = "integer" }, end_line = { type = "integer" }, left_path = { type = "string" }, right_path = { type = "string" } } }
