[whatsapp]
# 用途/Purpose: WhatsApp 适配器别名，用于主流程投递路由判断.
# 建议修改/Recommended change: 谨慎修改 / Change cautiously.
# 风险/Risk: 别名不匹配会导致消息走错通道（web/cloud）或回退默认路由.
web_adapters = ["whatsapp_web", "wa_web"]
# 用途/Purpose: WhatsApp Cloud 适配器别名.
# 建议修改/Recommended change: 谨慎修改 / Change cautiously.
# 风险/Risk: 误配会让 cloud 消息路由失效或回退到错误通道.
cloud_adapters = ["whatsapp_cloud", "wa_cloud"]

[duplicate_affirmation]
# 用途/Purpose: 重复确认文本去重窗口（秒）.
# 建议修改/Recommended change: 可改 / Editable.
# 风险/Risk: 太小去重失效；太大可能误去重用户真实二次确认.
window_secs = 120
# 用途/Purpose: 重复确认去重时的最近任务扫描上限.
# 建议修改/Recommended change: 可改 / Editable.
# 风险/Risk: 太小漏判；太大增加耗时并可能误判.
scan_limit = 30
# 用途/Purpose: 参与“重复确认去重”的任务状态白名单.
# 建议修改/Recommended change: 谨慎修改 / Change cautiously.
# 风险/Risk: 缺少关键状态会降低去重效果；加入过多状态会误去重.
statuses = ["queued", "running", "succeeded"]

# Price-alert action aliases (price_monitor / monitor_price / price_alert / volatility_alert -> price_alert_check)
# are normalized inside the `crypto` skill; clawd does not retry with alternate actions.

[runtime_channel]
# 用途/Purpose: 被视为 WhatsApp 的 channel 别名.
# 建议修改/Recommended change: 谨慎修改 / Change cautiously.
# 风险/Risk: 别名不完整会路由失败；别名过宽会误路由到 WhatsApp.
whatsapp_aliases = ["whatsapp"]

[classifier]
# 用途/Purpose: 这些 source 会绕过 chat 包装，直接返回分类标签.
# 建议修改/Recommended change: 谨慎修改 / Change cautiously.
# 风险/Risk: 误加会让普通对话返回“原始标签”；误删会破坏分类链路.
direct_sources = ["voice_mode_intent_detect", "voice_mode_intent_detect_regression"]

[resume]
# 用途/Purpose: 被视为“继续执行（resume）”语义的 source.
# 建议修改/Recommended change: 谨慎修改 / Change cautiously.
# 风险/Risk: 误配会导致上下文恢复逻辑不触发或误触发.
continue_sources = ["resume_continue_execute"]

[task_status]
# 用途/Purpose: 任务状态规范映射（主流程映射/统计使用）.
# 建议修改/Recommended change: 不建议修改 / Keep aligned with DB enum.
# 风险/Risk: 与数据库状态值不一致会导致状态识别错误、统计偏差.
queued = "queued"
# 用途/Purpose: running 状态字面量.
# 建议修改/Recommended change: 不建议修改 / Keep default.
# 风险/Risk: 影响任务执行中识别.
running = "running"
# 用途/Purpose: succeeded 状态字面量.
# 建议修改/Recommended change: 不建议修改 / Keep default.
# 风险/Risk: 影响成功结果识别.
succeeded = "succeeded"
# 用途/Purpose: failed 状态字面量.
# 建议修改/Recommended change: 不建议修改 / Keep default.
# 风险/Risk: 影响失败状态映射.
failed = "failed"
# 用途/Purpose: canceled 状态字面量.
# 建议修改/Recommended change: 不建议修改 / Keep default.
# 风险/Risk: 影响取消状态映射.
canceled = "canceled"
# 用途/Purpose: timeout 状态字面量.
# 建议修改/Recommended change: 不建议修改 / Keep default.
# 风险/Risk: 影响超时状态映射.
timeout = "timeout"

[assistant_name]
# 用途/Purpose: 从用户消息中提取“给助手设置名字/称呼”时使用的触发短语.
# 建议修改/Recommended change: 可改 / Editable.
# 风险/Risk: 过宽会误提取普通句子；过窄会漏掉真实名字设置.
extract_markers = [
  "记住你的名字叫",
  "记住你名字叫",
  "记住你叫",
  "以后叫你",
  "以后我叫你",
  "我给你取名叫",
  "我给你起名叫",
  "你的名字叫",
  "你叫",
  "call you ",
  "your name is ",
]
# 用途/Purpose: 提取后视为无效的名字值，避免把占位词写进偏好.
# 建议修改/Recommended change: 谨慎修改 / Change cautiously.
# 风险/Risk: 误删会把占位词存成名字；误加会屏蔽合法名字.
invalid_values = ["executor", "assistant", "agent", "系统", "身份", "formal identity"]
