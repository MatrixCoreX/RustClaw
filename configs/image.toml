# =========================
# Image Edit / 图像编辑
# =========================
# Vendor routing / 厂商路由规则：
# - openai/google: prefer native adapters / 优先原生适配
# - anthropic/grok/custom: compat only (OpenAI-compatible) / 仅兼容通道（OpenAI-compatible）
# - qwen: native + compat dual channels / 支持 native + compat 双通道
# - OSS note / OSS 说明：
#   - compat never uses OSS / compat 通道不使用 OSS
#   - qwen native only uses OSS when the selected native edit API requires URL input
#     and the request provides local/base64 input
#     / qwen 原生仅在所选原生编辑接口要求 URL 输入、而请求给的是本地/base64 输入时才会用 OSS
#   - current multimodal native edit models such as `qwen-image-edit-max` and `wan2.6-image`
#     accept direct image content and do NOT need OSS
#     / 当前多模态原生编辑模型（如 `qwen-image-edit-max`、`wan2.6-image`）可直接接收图像内容，不需要 OSS
#   - legacy URL-style native edit models such as `wanx2.1-imageedit` may still use OSS
#     for local/base64 input / 旧的 URL 型原生编辑模型（如 `wanx2.1-imageedit`）在本地/base64 输入时仍可能用 OSS
#
# adapter_mode:
# - auto: auto select (qwen/wanx prefers native, others compat) / 自动选择（qwen/wanx 优先 native，其它走 compat）
# - native: force native channel / 强制原生通道
# - compat: force compatible channel / 强制兼容通道
#
# Model selection priority / 模型选择优先级：
# request.model > default_model > <vendor>_models[0] > models[0] > llm.<vendor>.model
[image_edit]
# Routing & mode / 路由与模式
default_vendor = "minimax"
adapter_mode = "auto"
allow_compat_adapters = true
qwen_native_base_url = "https://dashscope.aliyuncs.com/api/v1"
qwen_native_function = "description_edit"

# Default model / 默认模型
default_model = "image-01"

# Vendor models / 按厂商模型
openai_models = ["gpt-image-1"]
google_models = ["gemini-2.5-flash-image-preview"]
anthropic_models = []
grok_models = []
qwen_models = ["qwen-image-edit-max", "wan2.6-image", "wanx2.1-imageedit"]
minimax_models = ["image-01"]
native_models = ["qwen-image-edit-max", "wan2.6-image", "wanx2.1-imageedit"]
models = ["qwen-image-edit-max", "wan2.6-image", "wanx2.1-imageedit"]

# Runtime limits / 运行限制
default_output_dir = "image/download"
max_concurrency = 1
max_images = 4
max_input_bytes = 10485760
timeout_seconds = 120

# Local file auto-upload for qwen native edit (optional) / 千问原生编辑的本地文件自动上传（可选）
# - applies only to URL-style qwen native edit flows / 仅作用于 URL 型 qwen 原生编辑链路
# - off: native mode requires image.url / 关闭时：native 模式要求传 image.url
# - on: local path/base64 uploads to OSS first, then uses signed URL / 开启时：本地 path/base64 会先上传 OSS，再自动生成签名 URL
# - no effect on multimodal native edit models that accept direct image content
#   / 对可直接接收图像内容的多模态原生编辑模型无影响
local_auto_upload_enabled = true
oss_access_key_id = ""
oss_access_key_secret = ""
oss_bucket = "rustclaw"
oss_endpoint = "oss-cn-beijing.aliyuncs.com"
oss_object_prefix = "rustclaw/image"
oss_url_ttl_seconds = 3600

# Optional dedicated provider override / 可选独立 provider 覆盖
# Recommended / 推荐：
# - image_edit: Qwen `qwen-image-edit-max` for current edit quality and native support
#   / 图片编辑推荐 Qwen `qwen-image-edit-max`，当前编辑效果和原生支持更合适
# [image_edit.providers.openai]
# base_url = "https://api.openai.com/v1"
# api_key = "REPLACE_ME_OPENAI_API_KEY"
# model = "gpt-image-1"
# timeout_seconds = 120
[image_edit.providers.minimax]
base_url = "https://api.minimax.io/v1"
api_key = "sk-api-IOdPwbp2BpNhBQiE1FINIezXrGeGLWZmjHpKYKvqEd5cZOmNS4r1JFcSDsZW4uvGhbV9-cM4E6ADQXuETabzVeIwl_CP_KkrBSmWh925tq_H5Rwt7JXqPMM"
model = "image-01"
timeout_seconds = 120
# [image_edit.providers.qwen]
# base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
# api_key = "sk-0f59ace4739a4fa897b0f3fa0a7b5ff2"
# model = "qwen-image-edit-max"
# timeout_seconds = 120

