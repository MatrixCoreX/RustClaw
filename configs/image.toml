# =========================
# Image Vision / 图像理解
# =========================
# This skill currently uses compatible I/O contract and routes internally by vendor adapters.
# 该技能当前统一走兼容式输入输出，内部按厂商适配。
# OSS note / OSS 说明：
# - current image vision path does NOT use OSS / 当前图像理解链路不使用 OSS
# Vendor selection priority / 厂商选择优先级：
# request.vendor > default_vendor > llm.selected_vendor
# Model selection priority / 模型选择优先级：
# request.model > default_model > <vendor>_models[0] > models[0] > llm.<vendor>.model
[image_vision]
# Routing & mode / 路由与模式
default_vendor = "minimax"
adapter_mode = "compat" # Vision currently recommended to stay in compat / vision 当前建议保持 compat

# Default model / 默认模型
default_model = "MiniMax-VL-01"

# Vendor models / 按厂商模型
openai_models = ["gpt-4o-mini", "gpt-4o"]
google_models = ["gemini-2.5-flash", "gemini-2.5-pro"]
anthropic_models = ["claude-sonnet-4-6"]
qwen_models = ["qwen-vl-max", "qwen-vl-plus"]
minimax_models = ["MiniMax-VL-01"]
models = ["qwen-vl-max", "qwen-vl-plus"]

# Runtime limits / 运行限制
default_output_dir = "image/upload"
max_concurrency = 1
max_images = 6
max_input_bytes = 10485760
timeout_seconds = 90

# Optional dedicated provider override / 可选独立 provider 覆盖
# Recommended / 推荐：
# - image_vision: OpenAI `gpt-4o-mini` for broad compatibility and steady vision output
#   / 图片理解推荐 OpenAI `gpt-4o-mini`，兼容性更广、输出更稳
