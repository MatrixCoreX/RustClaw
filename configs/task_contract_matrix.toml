schema_version = 1
matrix_version = "2026-05-23.p1"
failure_attribution = [
  "model_error",
  "schema_error",
  "code_gap",
  "contract_gap",
  "tool_gap",
  "permission_denied",
  "budget_exhausted",
  "prompt_budget_error",
  "delivery_error",
  "provider_error",
]

[policy]
unknown_semantic = "reject"
unknown_action = "reject"
evidence_missing = "retry_then_fail"

[trace_policy]
evidence_storage = "redacted_excerpt_hash"
provider_evidence_view = "provider_safe_redacted"
raw_excerpt_policy = "no_full_raw_excerpt"
max_items = 24
max_excerpt_chars = 240

[[generic_profiles]]
name = "generic_inline_transform"
semantic_kind = "none"
requires_content_evidence = true
delivery_required = false
response_shapes = ["strict"]
locator_kinds = ["none"]
policy_mode = "enforce"
evidence_scope = "current_task"
freshness = "current_task"
artifact_kind = "text"
channel_visibility = "user_visible"
evidence_profile = "generic"
allowed_actions = ["transform", "kb.search", "kb.list_namespaces", "kb.stats"]
preferred_actions = ["transform", "kb.search", "kb.list_namespaces", "kb.stats"]
forbidden_actions = ["run_cmd"]
required_evidence = ["field_value"]
final_answer_shape = "summary_with_evidence"
failure_policy = "retry_with_alternatives"

[generic_profiles.evidence_expression]
any_of = ["field_value", "content_excerpt"]

