[agent.hooks]
# 用途/Purpose: Codex/Claude 风格可信生命周期 hook；仅消费机器事件，不解析用户自然语言。
# Trusted lifecycle hooks consume versioned machine events only and never parse user NL.
# 没有启用 handler 时默认不改变执行行为；旧固定 action/tool 列表已删除，避免双重决策源。
# With no enabled handlers, hooks do not alter execution. Legacy fixed action/tool lists are removed.

# Trusted repository command hook template. Keep disabled until the relative path and SHA-256
# are reviewed together; changing the file invalidates trust before the next execution.
# [[agent.hooks.handlers]]
# id = "workspace_policy_guard"
# stage = "pre_tool_use"
# kind = "command"
# enabled = false
# trusted = false
# blocking = true
# path = "hooks/workspace-policy-guard"
# args = []
# content_sha256 = "sha256:replace_with_64_lowercase_hex_characters"
# timeout_ms = 3000
# max_input_bytes = 32768
# max_output_bytes = 16384
# max_attempts = 1
# failure_policy = "deny"

# Trusted HTTPS hook template. Credentials are environment references only; redirects are rejected.
# [[agent.hooks.handlers]]
# id = "review_service_guard"
# stage = "pre_tool_use"
# kind = "http"
# enabled = false
# trusted = false
# blocking = true
# url = "https://hooks.example.invalid/v1/review"
# auth_token_env = "RUSTCLAW_HOOK_REVIEW_TOKEN"
# allow_insecure_loopback = false
# timeout_ms = 3000
# max_input_bytes = 32768
# max_output_bytes = 16384
# max_attempts = 2
# failure_policy = "deny"

# Trusted MCP hook template. The capability must be low-risk, idempotent, and observe/validate only.
# [[agent.hooks.handlers]]
# id = "mcp_policy_guard"
# stage = "pre_tool_use"
# kind = "mcp"
# enabled = false
# trusted = false
# blocking = true
# capability = "mcp.policy.review"
# event_argument = "hook_event"
# timeout_ms = 3000
# max_input_bytes = 32768
# max_output_bytes = 16384
# max_attempts = 1
# failure_policy = "deny"

[agent.subagents]
# 用途/Purpose: subagent 角色与并发预算；只消费机器 token，不解析用户自然语言。
# Machine-only subagent role and parallel budget configuration. Inline children remain read-only;
# persistent writers run only in parent-reviewed local worktrees.
# allowed_roles 缺失或为空时使用代码默认全集。
allowed_roles = ["observe", "explorer", "worker", "writer", "review", "reviewer", "test", "verifier"]
# Inline read-only children use this limit. Persistent local-worktree writers have a separate
# always-on scheduler boundary of one active writer worktree per parent batch.
max_parallel_readonly = 4
# 子 agent 未显式给 budget.timeout_ms 时使用的默认 timeout；0 或缺失表示使用 parent loop 默认。
default_timeout_ms = 30000

[agent.task_budget]
# Interactive work uses resumable soft slices. These high administrator ceilings are
# fail-closed emergency boundaries and cannot be raised by planner/model output.
admin_max_model_turns = 256
admin_max_tool_calls = 512
admin_max_total_tokens = 100000000
admin_max_cost_usd_nanos = 100000000000
admin_max_elapsed_seconds = 86400
admin_max_continuations = 64
admin_max_non_resumable_tool_seconds = 3600

[agent.task_budget.profiles.general]
soft_slice_seconds = 300
stagnation_tolerance = 3
provider_timeout_class = "standard"
tool_timeout_class = "standard"

[agent.task_budget.profiles.fast_read]
soft_slice_seconds = 120
stagnation_tolerance = 2
provider_timeout_class = "short"
tool_timeout_class = "short"

[agent.task_budget.profiles.grounded_summary]
soft_slice_seconds = 300
stagnation_tolerance = 3
provider_timeout_class = "standard"
tool_timeout_class = "standard"

[agent.task_budget.profiles.multi_step_workspace]
soft_slice_seconds = 900
stagnation_tolerance = 4
provider_timeout_class = "standard"
tool_timeout_class = "long_tail"

[agent.task_budget.profiles.ops_closed_loop]
soft_slice_seconds = 1200
stagnation_tolerance = 4
provider_timeout_class = "standard"
tool_timeout_class = "long_tail"

[agent.loop_guard]
# 用途/Purpose: 单任务最大 agent 步数上限.
# 建议修改/Recommended change: 可改 / Editable.
# 风险/Risk: 过低会截断任务；过高可能增加循环成本.
max_steps = 32
# 用途/Purpose: Answer Verifier required-evidence 强制阻断范围；替代全局 bool.
# 终态值/Final token: all.
# 建议修改/Recommended change: 保持 all；非 all 的历史值会被 runtime 归一化为 all。
# 风险/Risk: verifier 误判应通过 evidence contract、extractor、registry metadata 或 planner prompt 修复，
# 不再通过关闭守卫或回退 legacy route 选择解决。
answer_verifier_enforce_required_scope = "all"
# 用途/Purpose: registry 幂等/去重治理范围；替代全局 bool.
# 终态值/Final token: all.
# 建议修改/Recommended change: 保持 all；非 all 的历史值会被 runtime 归一化为 all。
# 风险/Risk: 重复动作或外部副作用误拦截应通过 registry idempotency、dedup_scope、once_per_task
# 或 verifier policy 修复，不再通过关闭守卫或回退 legacy route 选择解决。
registry_idempotency_guard_scope = "all"
# 用途/Purpose: 同一动作重复阈值（跨轮累计）.
# 建议修改/Recommended change: 建议 3~6.
# 风险/Risk: 过低易误杀，过高会放大重复调用.
repeat_action_limit = 4
# 用途/Purpose: 同一动作签名重复多少次后中止.
# 建议修改/Recommended change: 可改 / Editable.
# 风险/Risk: 过低易误杀；过高会放大循环.
repeat_same_action_limit = 4

[agent.loop_guard.budget_profiles.fast_read]
# 用途/Purpose: 单次只读/状态/标量类任务，保持低延迟.
max_steps = 16
repeat_action_limit = 3

[agent.loop_guard.budget_profiles.grounded_summary]
# 用途/Purpose: 需要证据覆盖、摘要、比较、验证或命令输出总结的任务.
max_steps = 40
repeat_action_limit = 5

[agent.loop_guard.budget_profiles.multi_step_workspace]
# 用途/Purpose: 多文件/目录/交付/写入类 workspace 任务，允许更多观察与修复.
max_steps = 56
repeat_action_limit = 6

[agent.loop_guard.ops_closed_loop]
# 用途/Purpose: 针对“检查 -> 修改 -> 验证 -> 修复”这类长尾闭环任务的专属放宽配置。
# 建议修改/Recommended change: 只对复杂运维/配置任务放宽，避免影响普通短任务收敛速度。
# 风险/Risk: 过高会拉长单任务占用时间；过低仍可能截断长尾修复闭环。
max_steps = 48
repeat_action_limit = 6
max_repairs = 3
run_cmd_timeout_seconds = 180
run_cmd_validation_timeout_seconds = 90
