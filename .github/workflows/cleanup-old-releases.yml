name: Cleanup old platform releases

on:
  workflow_dispatch:
  push:
    tags:
      - "release-cleanup-*"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Keep only the newest release for each platform
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          ./scripts/cleanup-platform-releases.sh "ubuntu-x86_64-"
          ./scripts/cleanup-platform-releases.sh "pi-aarch64-"
