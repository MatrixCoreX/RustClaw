model = "MiniMax-M3"
effective_from = "2026-07-18"
currency = "USD"
source = "https://platform.minimax.io/docs/guides/pricing-paygo"
input_usd_per_million = 0.30
output_usd_per_million = 1.20
cache_read_usd_per_million = 0.06
long_context_threshold_tokens = 512000
long_context_input_usd_per_million = 0.60
long_context_output_usd_per_million = 2.40
long_context_cache_read_usd_per_million = 0.12

