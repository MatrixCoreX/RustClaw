[[generic_profiles]]
name = "generic_exact_command_output"
delivery_required = false
response_shapes = ["strict"]
structured_field_selectors = ["command_output"]
policy_mode = "enforce"
evidence_scope = "current_task"
freshness = "current_task"
artifact_kind = "text"
channel_visibility = "user_visible"
