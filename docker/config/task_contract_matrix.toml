[[generic_profiles]]
name = "generic_path_inspection"
requires_content_evidence = false
delivery_required = false
response_shapes = ["free", "one_sentence"]
locator_kinds = ["path", "current_workspace", "filename"]
structured_field_selectors = ["exists,path", "exists,kind,path"]
policy_mode = "enforce"
evidence_scope = "current_task"
freshness = "current_task"
artifact_kind = "text"
channel_visibility = "user_visible"
