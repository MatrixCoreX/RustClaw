preferred_actions = ["fs_basic.write_text", "audio_synthesize", "audio_synthesize.synthesize", "image_generate", "image_generate.generate", "image_generate.poll", "image_edit", "image_edit.edit", "video_generate", "video_generate.generate", "music_generate", "music_generate.generate"]
